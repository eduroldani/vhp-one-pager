<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Startup One Pager</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="sheet" id="sheet"></main>

    <script src="/data.js"></script>
    <script>
      const pathParts = location.pathname.split("/").filter(Boolean);
      const slug = pathParts[0] || "autocast";
      const isPrintRoute = pathParts[1] === "print";
      const startup = window.STARTUPS[slug] || window.STARTUPS["startup-name"];
      document.title = `${startup.name} | Startup One Pager`;
      document.body.classList.add(isPrintRoute ? "print-preview" : "online-preview");

      const sectionSlug = (value) => value.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");

      const textRows = (items) => items.map(([label, value]) => `
        <div class="fact-row">
          <span>${label}</span>
          <strong>${value}</strong>
        </div>
      `).join("");

      const bullets = (items = []) => items.length ? `
        <ul>${items.map((item) => `<li>${item}</li>`).join("")}</ul>
      ` : "";

      const paragraphs = (items = []) => items.map((item) => `<p>${item}</p>`).join("");

      const people = (items = []) => items.length ? `
        <div class="people-list">
          ${items.map(([name, role, details]) => `
            <div class="person">
              <div class="avatar">${name.split(" ").map((part) => part[0]).slice(0, 2).join("")}</div>
              <div>
                <strong>${name}</strong>
                <span>${role}</span>
                ${bullets(details)}
              </div>
            </div>
          `).join("")}
        </div>
      ` : "";

      const kpis = (items = []) => items.length ? `
        <div class="kpi-list">
          ${items.map(([number, label]) => `
            <div class="kpi">
              <strong>${number}</strong>
              <span>${label}</span>
            </div>
          `).join("")}
        </div>
      ` : "";

      const groupedBullets = (groups = []) => groups.map(([label, items]) => `
        <div class="group">
          <strong>${label}</strong>
          ${bullets(items)}
        </div>
      `).join("");

      const sections = startup.sections.map((section) => `
        <section class="card section-${sectionSlug(section.title)}">
          <div class="section-heading">
            <span class="section-icon">${section.icon}</span>
            <h2>${section.title}</h2>
          </div>
          ${paragraphs(section.body)}
          ${bullets(section.bullets)}
          ${paragraphs(section.afterBody)}
          ${people(section.people)}
          ${kpis(section.kpis)}
          ${groupedBullets(section.groupedBullets)}
        </section>
      `).join("");

      document.getElementById("sheet").innerHTML = `
        <nav class="mode-bar">
          <a href="/${slug}" class="${isPrintRoute ? "" : "active"}">Online</a>
          <a href="/${slug}/print" class="${isPrintRoute ? "active" : ""}">PDF</a>
        </nav>

        <header class="hero">
          <div>
            <p class="eyebrow">Startup One Pager</p>
            <h1>${startup.name}</h1>
            <p class="tagline">${startup.tagline}</p>
          </div>
          <div class="logo-mark">${startup.logoText}</div>
        </header>

        <section class="top-grid">
          <div class="info-card">
            <div class="section-heading compact">
              <span class="section-icon">Q</span>
              <h2>Quick Facts</h2>
            </div>
            ${textRows(startup.quickFacts)}
          </div>
          <div class="info-card">
            <div class="section-heading compact">
              <span class="section-icon">@</span>
              <h2>Contact</h2>
            </div>
            ${textRows(startup.contact)}
          </div>
        </section>

        <div class="content-grid">${sections}</div>

        <footer class="support">
          <div class="support-icon">UP</div>
          <div>
            <span>${startup.supportNeed.label}</span>
            <strong>${startup.supportNeed.value}</strong>
          </div>
          <img class="incubator-logo" src="${startup.incubatorLogo}" alt="Vision Health Pioneers Incubator">
        </footer>
      `;
    </script>
  </body>
</html>
